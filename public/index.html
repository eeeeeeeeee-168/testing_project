<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Laptop & MacBook Shop</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Laptop & MacBook Shop</h1>
  </header>

  <main>
    <section class="controls">
      <input id="search" placeholder="Search title or description" />
      <label>Filter:
        <select id="filter">
          <option value="all">All</option>
          <option value="macbook">MacBook</option>
          <option value="laptop">Laptop</option>
        </select>
      </label>
      <button id="refresh">Refresh</button>
    </section>

    <section id="products" class="grid"></section>

    <section class="form">
      <h2>Add Product</h2>
      <form id="addForm" enctype="multipart/form-data">
        <input id="title" name="title" placeholder="Title" required />
        <select id="type" name="type">
          <option value="laptop">Laptop</option>
          <option value="macbook">MacBook</option>
        </select>
        <input id="price" name="price" type="number" step="0.01" placeholder="Price" required />
        <input id="description" name="description" placeholder="Short description" />
        <input id="image" name="image" type="file" accept="image/*" />
        <button type="submit">Add</button>
      </form>
    </section>
    <section class="pagination">
      <button id="prevPage">Prev</button>
      <span id="pageInfo">Page 1</span>
      <button id="nextPage">Next</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
